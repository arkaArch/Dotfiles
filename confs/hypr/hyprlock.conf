background {
    path = $HOME/Dotfiles/wallpapers/everforest/parc_national_du_mercantour.jpg
    blur_passes = 1
}

image { 
    path = $HOME/Dotfiles/wallpapers/user/man.png
    size = 150
    rounding = -1
    border_size = 0
    position = 0, 140
    halign = center
    valign = center
}

input-field {
    size = 15%, 3%
    outline_thickness = 3
    dots_size = 0.35
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(219, 188, 127, 1)    # Everforest dark -> yellow
    check_color = rgba(167, 192, 128, 1)    # Everforest dark -> green
    fail_color = rgba(230, 126, 128, 1)     # Everforest dark -> red

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}
